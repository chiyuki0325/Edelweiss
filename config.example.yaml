models:
  primary:
    apiBaseUrl: ""
    apiKey: ""
    model: "claude-opus-4-6"
    reasoningSignatureCompat: "anthropic"
    # apiFormat: "responses"        # optional: 'openai-chat' (default) or 'responses'
    # timeoutSec: 120                # optional: abort requests that stream for too long
    # maxImagesAllowed: 100     # optional: drop oldest images when context exceeds this limit
  probe:
    apiBaseUrl: ""
    apiKey: ""
    model: "claude-haiku-4-5"
    reasoningSignatureCompat: "anthropic"
    # timeoutSec: 60                 # optional: abort requests that stream for too long
    # maxImagesAllowed: 10     # optional: Gemini Flash allows max 10 images

telegram:
  botToken: ""
  apiId: 0
  apiHash: ""
  session: ""

database:
  path: "./data/cahciua.db"

# Runtime configuration: shell and file I/O commands used by tools.
# These are global (not per-chat) because they describe the execution environment.
runtime:
  shell: ["/bin/bash", "-c"]                          # command prefix for bash tool
  # writeFile: ["/bin/bash", "-c", "/usr/bin/cat > \"$0\""]  # write stdin to file (path appended as arg)
  # readFile: ["/usr/bin/cat"]                                # read file to stdout (path appended as arg); enables local-path read_image and send_message attachments
  # writeFileSizeLimit: 20971520                              # max bytes for download_file (default 20 MB)
  # readFileSizeLimit: 20971520                               # max bytes for runtime.readFile consumers (send_message attachments, local-path read_image)

# Per-chat configuration. Keys (except "default") serve as the chat ID whitelist.
# Each per-chat entry is deep-merged with "default" — only specify overrides.
chats:
  default:
    model: "primary"            # references a key in models
    # systemFiles:              # identity files injected into the system prompt (read at startup)
    #   - "./prompts/IDENTITY.md"
    #   - "./prompts/SOUL.md"
    debounce:
      initialDelayMs: 1000      # wait for same sender's follow-up messages within this window
      typingExtendMs: 5000      # extend wait when someone is typing (~Telegram typing event interval)
      maxDelayMs: 30000         # hard cap — never wait longer than this
    compaction:
      enabled: true
      maxContextEstTokens: 512000    # high water mark: trigger compaction when estimated context exceeds this
      workingWindowEstTokens: 8000   # low water mark: how many estimated tokens of raw content to retain after compaction
      # model: "primary"           # optional: override model for compaction calls (defaults to chat model)
      dryRun: false               # true = call LLM and log summary, but don't persist or apply
    # Probe: use a small/cheap model to decide whether to respond in group chats.
    # When the bot is not @'d or replied to, the probe model runs first. If it
    # chooses silence (no tool calls), the primary model is skipped entirely.
    # If it produces tool calls, the primary model is activated for the real response.
    probe:
      enabled: false
      model: "probe"              # references a key in models
    imageToText:
      enabled: false
      model: "primary"            # references a key in models
    animationToText:
      enabled: false
      model: "primary"            # references a key in models
      # maxFrames: 5              # max equidistant frames to extract (default 5)
    customEmojiToText:
      enabled: false
      model: "primary"            # references a key in models
      # maxFrames: 5              # max equidistant frames for animated custom emoji (default 5)
    # Feature flags should be enabled in local dev config when first introduced.
    features:
      trimStaleNoToolCallTurnResponses: false
      trimSelfMessagesCoveredBySendToolCalls: false
      trimToolResults: false
      sendTypingAction: true         # send Bot API typing action while primary model is running
    # Human-likeness heuristics: each check can be disabled independently (all enabled by default).
    # These feed the late-binding feedback XML that nudges the model toward more natural phrasing.
    # humanLikeness:
    #   trailingPeriod: true          # flag messages ending with a full stop
    #   denseClausePunctuation: true  # flag short messages packed with clause punctuation
    #   multipleMarkdownBold: true    # flag more than one **bold** span
    #   markdownList: true            # flag Markdown lists
    #   markdownHeader: true          # flag Markdown headers
    #   newline: true                 # flag any newline in a send_message
    # Tools: enable extra tools for this chat.
    tools:
      readImage:
        enabled: false                            # works with attachment file-id only; add runtime.readFile for local path support
    # Other optional tools:
    #   bash:
    #     enabled: false
    #   downloadFile:
    #     enabled: false                          # requires runtime.writeFile
    #   sendMessage:
    #     enableAttachments: false                # requires runtime.readFile
    #   webSearch:
    #     enabled: false
    #     tavilyKey: ""                           # Tavily API key for web search

  # Per-chat overrides — uncomment and customize:
  # "751414718":                   # per-chat partial override (deep-merged with default)
  #   model: "secondary"
  # "-1002173016093": {}           # whitelisted with all defaults
